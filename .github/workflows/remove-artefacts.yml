name: Remove Old Branch Artefacts

on:
    schedule:
      - cron: '10 9 * * 1'   # 9:10 on Monday
    workflow_dispatch:

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - pollingagent
          - control_metrics
          - control_partition_metrics
          - control
          - core_stream_test_worker
          - core_stream_test_client
          - core_htcmock_test_worker
          - core_htcmock_test_client
          - core_bench_test_worker
          - core_bench_test_client
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6

    - name: Install dependencies
      run: pip install requests

    - name: Remove old branch images
      uses: aneoconsulting/ArmoniK.Actions.CleanupArtifacts/remove-images@main
      with:
        org: dockerhubaneo
        image: ${{ matrix.image }}
        user: ${{ secrets.DOCKERHUB_USER }}
        token: ${{ secrets.DOCKERHUB_TOKEN }}

  nugets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        nuget:
          - ArmoniK.Core.Base
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6

    - name: Install dependencies
      run: pip install requests

    - name: Unlist old branch nugets
      uses: aneoconsulting/ArmoniK.Actions.CleanupArtifacts/unlist-nugets@main
      with:
        nuget: ${{ matrix.nuget }}
        token: ${{ secrets.NUGET_API_KEY }}
